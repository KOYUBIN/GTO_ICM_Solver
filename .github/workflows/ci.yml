name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install
        run: npm install
      - name: Build engine
        run: npm run build:engine
      - name: Test engine
        run: npm run test:engine
      - name: Build web (production)
        run: npm run build:web
